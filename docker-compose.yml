version: '3.8'

services:
  myflowmusic:
    build: .
    container_name: myflowmusic
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage
      - ./vault:/app/vault
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - MUSIC_AGENT_DB_TYPE=sqlite
      - MUSIC_AGENT_DB_CONN=/app/storage/myflowmusic.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for production
  postgres:
    image: postgres:15-alpine
    container_name: myflowmusic-db
    environment:
      POSTGRES_USER: musicagent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: musicagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    profiles:
      - postgres

volumes:
  postgres_data:
